<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kairo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237b6ef6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='20' fill='white'%3EK%3C/text%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    /* Bookmarklet tray that floats over the proxy frame */
    #bm-tray {
      position: fixed;
      bottom: 60px;
      right: 16px;
      z-index: 600;
      display: none;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
    }
    #bm-tray.open { display: flex; }
    .bm-tray-item {
      background: rgba(14,16,20,0.95);
      border: 1px solid #252b35;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.82rem;
      color: #8a94a0;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(12px);
      transition: border-color 0.15s, color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .bm-tray-item:hover { border-color: #7b6ef6; color: #e8ecf0; }
    #bm-toggle {
      position: fixed;
      bottom: 14px;
      right: 16px;
      z-index: 601;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #7b6ef6;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(123,110,246,0.4);
      transition: background 0.15s, transform 0.15s;
    }
    #bm-toggle.visible { display: flex; }
    #bm-toggle:hover { background: #9d92fa; transform: scale(1.08); }
    #bm-toggle svg { width: 18px; height: 18px; color: white; }
  </style>

  <script>
    var _uiShown = false;
    function showUI() {
      if (_uiShown) return; _uiShown = true;
      var l = document.getElementById("loader"), h = document.getElementById("home");
      if (l) l.style.display = "none";
      if (h) h.style.display = "block";
    }
    setTimeout(showUI, 5000);
    window.addEventListener("error", function(e){ console.error("[Kairo]", e.message); showUI(); });
    window.addEventListener("unhandledrejection", function(e){ console.error("[Kairo]", e.reason); showUI(); });
  </script>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Kairo</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="home" style="display:none;">
  <nav class="nav">
    <a class="nav-brand" href="/">Kairo</a>
    <div class="nav-actions">
      <span id="greeting-name" style="font-size:0.78rem;color:#5a6370;margin-right:4px;"></span>
      <a class="nav-btn" href="/admin" id="admin-link" style="display:none;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Admin
      </a>
      <button class="nav-btn" id="reset-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
        Reset
      </button>
      <button class="nav-btn" id="logout-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <div style="text-align:center;">
        <div class="hero-heading">Kairo</div>
        <div class="hero-sub">Private Browsing</div>
      </div>
      <div class="search-wrap">
        <input type="text" id="url-input" class="search-input" placeholder="Search or enter a URL…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="search-go" id="go-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <div class="error-toast" id="error-toast" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-msg">Something went wrong. Please try again.</span>
      </div>
    </section>

    <section>
      <div class="section-label">Quick Access</div>
      <div class="pins-grid" id="pins-grid"></div>
    </section>
  </main>

  <footer class="footer-bar"><span>Kairo &mdash; Private Browsing</span></footer>
</div>

<!-- Proxy view — UV iframe fills screen -->
<div id="proxy-view" style="display:none;position:fixed;inset:0;z-index:500;flex-direction:column;background:#07080a;">
  <div class="proxy-bar">
    <!-- Back -->
    <button class="proxy-back" id="proxy-back-btn" title="Back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <!-- Forward -->
    <button class="proxy-back" id="proxy-fwd-btn" title="Forward">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <!-- URL bar (editable) -->
    <input id="proxy-url-bar" class="proxy-url-input" value="" placeholder="Enter URL…" autocomplete="off" spellcheck="false"/>
    <!-- Reload -->
    <button class="proxy-back" id="proxy-reload-btn" title="Reload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
    </button>
    <!-- Home -->
    <button class="proxy-back" id="proxy-home-btn" title="Home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </div>
  <iframe id="uv-frame" style="flex:1;border:none;width:100%;display:block;" allow="fullscreen"></iframe>
</div>

<!-- Bookmarklet toggle button (shows when in proxy view) -->
<button id="bm-toggle" title="Bookmarklets">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2H5z"/></svg>
</button>
<!-- Bookmarklet tray -->
<div id="bm-tray"></div>

<!-- Inactivity overlay -->
<div id="timeout-overlay" style="display:none;position:fixed;inset:0;background:rgba(7,8,10,0.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#e8ecf0;">Session expired</div>
  <div style="font-size:0.85rem;color:#5a6370;">You were inactive for 20 minutes</div>
  <button id="signin-again-btn" style="margin-top:8px;padding:10px 24px;background:#7b6ef6;border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;">Sign in again</button>
</div>

<!-- UV scripts -->
<script src="/baremux/index.js"></script>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/register-sw.js"></script>
<script src="/search.js"></script>

<script>
var WISP_URL = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";
var connection = null;
var swReady = false;
var bookmarklets = [];

// ── Init BareMux ─────────────────────────────────────────
function initBaremux() {
  try {
    connection = new BareMux.BareMuxConnection("/baremux/worker.js");
    connection.getTransport().then(function(t) {
      if (t !== "/epoxy/index.mjs") {
        return connection.setTransport("/epoxy/index.mjs", [{ wisp: WISP_URL }]);
      }
    }).then(function() {
      console.log("[Kairo] Transport ready ✓");
    }).catch(function(e) { console.warn("[Kairo] Transport:", e); });
  } catch(e) { console.warn("[Kairo] BareMux:", e); }
}

// ── Register SW ──────────────────────────────────────────
function ensureSW() {
  if (swReady) return Promise.resolve();
  return registerSW().then(function() { swReady = true; });
}

// ── Navigate ─────────────────────────────────────────────
function go() {
  hideError();
  var val = document.getElementById("url-input").value.trim();
  if (!val) return;
  val = search(val, "https://www.google.com/search?q=%s");

  ensureSW().then(function() {
    return connection.getTransport().then(function(t) {
      if (t !== "/epoxy/index.mjs") {
        return connection.setTransport("/epoxy/index.mjs", [{ wisp: WISP_URL }]);
      }
    });
  }).then(function() {
    openProxy(val);
  }).catch(function(e) {
    showError(e.message || "Failed to connect");
  });
}

function goTo(url) {
  document.getElementById("url-input").value = url;
  go();
}

function openProxy(url) {
  var frame = document.getElementById("uv-frame");
  frame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
  document.getElementById("proxy-url-bar").value = url;
  document.getElementById("proxy-view").style.display = "flex";
  document.getElementById("home").style.display = "none";
  document.getElementById("bm-toggle").classList.add("visible");
  document.getElementById("bm-tray").classList.remove("open");
  saveServerCookies();
}

function closeProxy() {
  document.getElementById("proxy-view").style.display = "none";
  document.getElementById("home").style.display = "block";
  document.getElementById("bm-toggle").classList.remove("visible");
  document.getElementById("bm-tray").classList.remove("open");
  document.getElementById("uv-frame").src = "about:blank";
}

function showError(msg) {
  document.getElementById("error-msg").textContent = msg || "Something went wrong.";
  document.getElementById("error-toast").style.display = "flex";
}
function hideError() { document.getElementById("error-toast").style.display = "none"; }

// ── Proxy bar nav ────────────────────────────────────────
document.getElementById("proxy-back-btn").addEventListener("click", function() {
  try { document.getElementById("uv-frame").contentWindow.history.back(); } catch(e) {}
});
document.getElementById("proxy-fwd-btn").addEventListener("click", function() {
  try { document.getElementById("uv-frame").contentWindow.history.forward(); } catch(e) {}
});
document.getElementById("proxy-reload-btn").addEventListener("click", function() {
  try { document.getElementById("uv-frame").contentWindow.location.reload(); } catch(e) {}
});
document.getElementById("proxy-home-btn").addEventListener("click", closeProxy);

document.getElementById("proxy-url-bar").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var val = search(this.value.trim(), "https://www.google.com/search?q=%s");
    document.getElementById("uv-frame").src = __uv$config.prefix + __uv$config.encodeUrl(val);
  }
});

// Update URL bar when frame navigates
document.getElementById("uv-frame").addEventListener("load", function() {
  try {
    var src = this.contentWindow.location.href;
    if (src && src !== "about:blank") {
      var decoded = __uv$config.decodeUrl(src.replace(location.origin + __uv$config.prefix, ""));
      if (decoded) document.getElementById("proxy-url-bar").value = decoded;
    }
  } catch(e) {}
});

// ── Devtools shortcut Ctrl+Shift+Alt+I ───────────────────
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.shiftKey && e.altKey && e.key === "I") {
    e.preventDefault();
    var frame = document.getElementById("uv-frame");
    if (frame.style.display !== "none" && document.getElementById("proxy-view").style.display !== "none") {
      // Open devtools-like inspect on the frame
      // Since cross-origin devtools isn't directly possible via JS, we open the frame URL in a new tab
      // so the user can right-click → inspect
      var src = frame.src;
      if (src && src !== "about:blank") window.open(src, "_blank");
      alert("Tip: Right-click the page that opened and select Inspect to open DevTools.");
    }
  }
  // Also handle Enter on main search
  if (e.key === "Enter" && document.activeElement === document.getElementById("url-input")) go();
});

// ── Bookmarklet tray ─────────────────────────────────────
document.getElementById("bm-toggle").addEventListener("click", function() {
  document.getElementById("bm-tray").classList.toggle("open");
});

function renderBookmarkletTray() {
  var tray = document.getElementById("bm-tray");
  if (!bookmarklets.length) { tray.innerHTML = '<div class="bm-tray-item" style="cursor:default;opacity:0.5;">No bookmarklets</div>'; return; }
  tray.innerHTML = bookmarklets.map(function(b) {
    return '<div class="bm-tray-item" data-code="' + encodeURIComponent(b.code) + '">' + b.name + '</div>';
  }).join("");
  tray.querySelectorAll(".bm-tray-item[data-code]").forEach(function(el) {
    el.addEventListener("click", function() {
      var code = decodeURIComponent(this.getAttribute("data-code"));
      var frame = document.getElementById("uv-frame");
      try {
        // Inject bookmarklet into the proxied frame
        frame.contentWindow.eval(code);
      } catch(e) {
        // Fallback: try via src
        frame.src = "javascript:" + encodeURIComponent(code);
      }
      document.getElementById("bm-tray").classList.remove("open");
    });
  });
}

// ── Pins ─────────────────────────────────────────────────
function loadPins() {
  fetch("/api/pins").then(function(r){ return r.json(); }).then(function(data) {
    document.getElementById("pins-grid").innerHTML = (data.pins || []).map(function(p) {
      return '<div class="pin" onclick="goTo(\'' + p.url + '\')" title="' + p.name + '">' +
        '<img src="https://cdn.simpleicons.org/' + encodeURIComponent(p.icon) + '/ffffff"' +
        ' alt="' + p.name + '" loading="lazy"' +
        ' onerror="this.style.opacity=\'0.3\';this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%229%22 stroke=%22white%22 stroke-width=%221.5%22 fill=%22none%22/%3E%3C/svg%3E\'"/>' +
        '</div>';
    }).join("");
  }).catch(function(){});
}

// ── Bookmarklets ─────────────────────────────────────────
function loadBookmarklets() {
  fetch("/api/bookmarklets").then(function(r){ return r.json(); }).then(function(items) {
    bookmarklets = items || [];
    renderBookmarkletTray();
  }).catch(function(){});
}

// ── Cookie sync ──────────────────────────────────────────
function loadServerCookies() {
  return fetch("/api/cookies").then(function(r){ return r.json(); }).then(function(data) {
    if (!data.cookies) return;
    data.cookies.split("||").forEach(function(entry) {
      var idx = entry.indexOf("=:=");
      if (idx === -1) return;
      document.cookie = decodeURIComponent(entry.slice(0, idx)) + "=" + decodeURIComponent(entry.slice(idx + 3)) + "; path=/; SameSite=Lax";
    });
  }).catch(function(){});
}

function saveServerCookies() {
  try {
    var encoded = document.cookie.split(";").map(function(c){ return c.trim(); }).filter(Boolean).map(function(c) {
      var i = c.indexOf("=");
      return i === -1 ? null : encodeURIComponent(c.slice(0,i).trim()) + "=:=" + encodeURIComponent(c.slice(i+1).trim());
    }).filter(Boolean).join("||");
    if (!encoded) return;
    fetch("/api/cookies", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ cookies: encoded }), keepalive: true });
  } catch(e) {}
}

function clearSessions() {
  document.cookie.split(";").forEach(function(c) {
    document.cookie = c.trim().split("=")[0] + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
  });
  fetch("/api/cookies", { method: "DELETE" }).then(function() { alert("Sessions cleared."); });
}

function logout() {
  fetch("/api/logout", { method: "POST" }).then(function() { location.href = "/login.html"; });
}

// ── Inactivity ───────────────────────────────────────────
var inactivityTimer;
function resetTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(function() {
    fetch("/api/logout", { method: "POST" }).then(function() {
      document.getElementById("timeout-overlay").style.display = "flex";
    });
  }, 20 * 60 * 1000);
}
["mousemove","keydown","click","scroll","touchstart"].forEach(function(e) {
  document.addEventListener(e, resetTimer, { passive: true });
});

// ── Wire buttons ─────────────────────────────────────────
document.getElementById("go-btn").addEventListener("click", go);
document.getElementById("logout-btn").addEventListener("click", logout);
document.getElementById("reset-btn").addEventListener("click", clearSessions);
document.getElementById("signin-again-btn").addEventListener("click", function() { location.href = "/login.html"; });

// ── Boot ─────────────────────────────────────────────────
fetch("/api/me").then(function(r){ return r.json(); }).then(function(me) {
  if (!me.loggedIn) { location.href = "/login.html"; return; }

  // Show display name
  if (me.displayName) {
    document.getElementById("greeting-name").textContent = "Hi, " + me.displayName + " 👋";
  }
  if (me.isAdmin) document.getElementById("admin-link").style.display = "inline-flex";

  initBaremux();

  Promise.all([loadServerCookies(), loadPins(), loadBookmarklets()]).then(function() {
    resetTimer();
    setInterval(saveServerCookies, 15000);
    window.addEventListener("beforeunload", saveServerCookies);
    showUI();
  }).catch(function() { showUI(); });
}).catch(function() { location.href = "/login.html"; });
</script>
</body>
</html>
