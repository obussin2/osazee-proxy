<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kairo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237b6ef6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='20' fill='white'%3EK%3C/text%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>

  <!-- Error handlers FIRST — before any external scripts so we catch load failures -->
  <script>
    var _uiShown = false;
    function showUI() {
      if (_uiShown) return;
      _uiShown = true;
      var loader = document.getElementById("loader");
      var home   = document.getElementById("home");
      if (loader) loader.style.display = "none";
      if (home)   home.style.display   = "block";
    }
    // Nuclear fallback — show UI after 4s no matter what
    setTimeout(showUI, 4000);
    window.addEventListener("error", function(e) {
      console.error("[Kairo] Script error:", e.message, e.filename);
      showUI();
    });
    window.addEventListener("unhandledrejection", function(e) {
      console.error("[Kairo] Unhandled promise:", e.reason);
      showUI();
    });
  </script>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Kairo</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="home" style="display:none;">
  <nav class="nav">
    <a class="nav-brand" href="/">Kairo</a>
    <div class="nav-actions">
      <a class="nav-btn" href="/admin" id="admin-link" style="display:none;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Admin
      </a>
      <button class="nav-btn" id="reset-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
        Reset
      </button>
      <button class="nav-btn" id="logout-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <div style="text-align:center;">
        <div class="hero-heading">Kairo</div>
        <div class="hero-sub">Private Browsing</div>
      </div>
      <div class="search-wrap">
        <input type="text" id="url-input" class="search-input" placeholder="Search or enter a URL…" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="search-go" id="go-btn" aria-label="Go">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <div class="error-toast" id="error-toast" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-msg">Something went wrong. Please try again.</span>
      </div>
    </section>

    <section>
      <div class="section-label">Quick Access</div>
      <div class="pins-grid" id="pins-grid"></div>
    </section>

    <section id="bookmarklets-section" style="display:none;">
      <div class="section-label">Bookmarklets</div>
      <div class="bookmarks-grid" id="bookmarks-grid"></div>
    </section>
  </main>

  <footer class="footer-bar"><span>Kairo &mdash; Private Browsing</span></footer>
</div>

<!-- Proxy frame view -->
<div id="proxy-view" style="display:none;position:fixed;inset:0;z-index:500;flex-direction:column;background:var(--bg);">
  <div class="proxy-bar">
    <button class="proxy-back" id="close-proxy-btn" title="Back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="proxy-url" id="proxy-url-display">Loading…</div>
    <button class="proxy-back" id="reload-proxy-btn" title="Reload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
    </button>
  </div>
  <div id="frame-container" style="flex:1;overflow:hidden;"></div>
</div>

<!-- Inactivity overlay -->
<div id="timeout-overlay" style="display:none;position:fixed;inset:0;background:rgba(7,8,10,0.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#e8ecf0;">Session expired</div>
  <div style="font-size:0.85rem;color:#5a6370;">You were inactive for 20 minutes</div>
  <button id="signin-again-btn" style="margin-top:8px;padding:10px 24px;background:#7b6ef6;border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;">Sign in again</button>
</div>

<!-- External scripts loaded async so they don't block rendering -->
<script src="/scram/scramjet.all.js" defer></script>
<script src="/baremux/index.js" defer></script>
<script src="/register-sw.js" defer></script>
<script src="/search.js" defer></script>

<script defer>
var scramjet    = null;
var connection  = null;
var currentFrame = null;
var swReady     = false;
var WISP_URL    = (location.protocol === "https:" ? "wss" : "ws") + "://" + location.host + "/wisp/";

function initScramjet() {
  try {
    if (typeof $scramjetLoadController !== "function") return;
    var ctrl = $scramjetLoadController();
    if (!ctrl || !ctrl.ScramjetController) return;
    scramjet = new ctrl.ScramjetController({
      files: {
        wasm: "/scram/scramjet.wasm.wasm",
        all:  "/scram/scramjet.all.js",
        sync: "/scram/scramjet.sync.js",
      },
    });
    scramjet.init();
    console.log("[Kairo] Scramjet ready");
  } catch(e) { console.warn("[Kairo] Scramjet init:", e); }
}

function initBaremux() {
  try {
    if (typeof BareMux === "undefined") return;
    connection = new BareMux.BareMuxConnection("/baremux/worker.js");
    connection.getTransport().then(function(t) {
      if (t !== "/libcurl/index.mjs") {
        return connection.setTransport("/libcurl/index.mjs", [{ websocket: WISP_URL }]);
      }
    }).then(function() {
      console.log("[Kairo] Transport ready");
    }).catch(function(e) { console.warn("[Kairo] Transport:", e); });
  } catch(e) { console.warn("[Kairo] BareMux:", e); }
}

function ensureSW() {
  if (swReady) return Promise.resolve(true);
  if (typeof registerSW !== "function") return Promise.resolve(false);
  return registerSW()
    .then(function() { swReady = true; return true; })
    .catch(function(e) { showError("SW: " + e.message); return false; });
}

function go() {
  hideError();
  var val = document.getElementById("url-input").value.trim();
  if (!val) return;
  if (typeof search === "function") val = search(val, "https://www.google.com/search?q=%s");
  else if (!val.startsWith("http")) val = val.includes(".") ? "https://" + val : "https://www.google.com/search?q=" + encodeURIComponent(val);

  ensureSW().then(function(ok) {
    if (!ok) { showError("Service worker not available"); return; }
    if (!scramjet) { showError("Proxy not ready — reload the page"); return; }

    var p = connection
      ? connection.getTransport().then(function(t) {
          if (t !== "/libcurl/index.mjs") return connection.setTransport("/libcurl/index.mjs", [{ websocket: WISP_URL }]);
        })
      : Promise.resolve();

    p.then(function() { openProxy(val); })
     .catch(function(e) { showError("Transport error: " + e.message); });
  });
}

function goTo(url) {
  document.getElementById("url-input").value = url;
  go();
}

function openProxy(url) {
  if (currentFrame) { try { currentFrame.frame.remove(); } catch(e) {} currentFrame = null; }
  try {
    var frame = scramjet.createFrame();
    frame.frame.style.cssText = "width:100%;height:100%;border:none;display:block;";
    var container = document.getElementById("frame-container");
    container.innerHTML = "";
    container.appendChild(frame.frame);
    currentFrame = frame;
    document.getElementById("proxy-url-display").textContent = url;
    document.getElementById("proxy-view").style.display = "flex";
    document.getElementById("home").style.display = "none";
    frame.go(url);
    saveServerCookies();
  } catch(e) { showError("Failed: " + e.message); }
}

function closeProxy() {
  if (currentFrame) { try { currentFrame.frame.remove(); } catch(e) {} currentFrame = null; }
  document.getElementById("proxy-view").style.display = "none";
  document.getElementById("home").style.display = "block";
}

function reloadProxy() {
  try { currentFrame && currentFrame.frame.contentWindow.location.reload(); } catch(e) {}
}

function showError(msg) {
  document.getElementById("error-msg").textContent = msg || "Something went wrong.";
  document.getElementById("error-toast").style.display = "flex";
}
function hideError() { document.getElementById("error-toast").style.display = "none"; }

function loadPins() {
  fetch("/api/pins").then(function(r){return r.json();}).then(function(data){
    document.getElementById("pins-grid").innerHTML = (data.pins||[]).map(function(p){
      return '<div class="pin" onclick="goTo(\''+p.url+'\')" title="'+p.name+'">' +
        '<img src="https://cdn.simpleicons.org/'+encodeURIComponent(p.icon)+'/ffffff" alt="'+p.name+'" loading="lazy"' +
        ' onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%229%22 stroke=%22white%22 stroke-width=%221.5%22 fill=%22none%22/%3E%3C/svg%3E\';this.style.opacity=\'0.3\'"/></div>';
    }).join("");
  }).catch(function(){});
}

function loadBookmarklets() {
  fetch("/api/bookmarklets").then(function(r){return r.json();}).then(function(items){
    var section = document.getElementById("bookmarklets-section");
    if (!items||!items.length){section.style.display="none";return;}
    section.style.display="block";
    document.getElementById("bookmarks-grid").innerHTML = items.map(function(b){
      return '<a class="bookmark-chip" href="javascript:'+encodeURIComponent(b.code)+'" title="'+(b.description||b.name)+'" draggable="true">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2H5z"/></svg>' +
        b.name+'</a>';
    }).join("");
  }).catch(function(){});
}

function loadServerCookies() {
  return fetch("/api/cookies").then(function(r){return r.json();}).then(function(data){
    if (!data.cookies) return;
    data.cookies.split("||").forEach(function(entry){
      var idx = entry.indexOf("=:=");
      if (idx === -1) return;
      document.cookie = decodeURIComponent(entry.slice(0,idx)) + "=" + decodeURIComponent(entry.slice(idx+3)) + "; path=/; SameSite=Lax";
    });
  }).catch(function(){});
}

function saveServerCookies() {
  try {
    var encoded = document.cookie.split(";").map(function(c){return c.trim();}).filter(Boolean).map(function(c){
      var i = c.indexOf("=");
      return i===-1?null:encodeURIComponent(c.slice(0,i).trim())+"=:="+encodeURIComponent(c.slice(i+1).trim());
    }).filter(Boolean).join("||");
    if (!encoded) return;
    fetch("/api/cookies",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cookies:encoded}),keepalive:true});
  } catch(e){}
}

function clearSessions() {
  document.cookie.split(";").forEach(function(c){
    document.cookie=c.trim().split("=")[0]+"=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
  });
  fetch("/api/cookies",{method:"DELETE"}).then(function(){alert("Sessions cleared.");});
}

function logout() {
  fetch("/api/logout",{method:"POST"}).then(function(){location.href="/login.html";});
}

var inactivityTimer;
function resetTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(function(){
    fetch("/api/logout",{method:"POST"}).then(function(){
      document.getElementById("timeout-overlay").style.display="flex";
    });
  }, 20*60*1000);
}
["mousemove","keydown","click","scroll","touchstart"].forEach(function(e){
  document.addEventListener(e,resetTimer,{passive:true});
});

// Wiring buttons
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("go-btn").addEventListener("click", go);
  document.getElementById("logout-btn").addEventListener("click", logout);
  document.getElementById("reset-btn").addEventListener("click", clearSessions);
  document.getElementById("close-proxy-btn").addEventListener("click", closeProxy);
  document.getElementById("reload-proxy-btn").addEventListener("click", reloadProxy);
  document.getElementById("signin-again-btn").addEventListener("click", function(){ location.href="/login.html"; });
  document.getElementById("url-input").addEventListener("keydown", function(e){ if(e.key==="Enter") go(); });
});

// ── Boot ─────────────────────────────────────────────────
fetch("/api/me")
  .then(function(r){ return r.json(); })
  .then(function(me) {
    if (!me.loggedIn) { location.href = "/login.html"; return; }
    if (me.isAdmin) document.getElementById("admin-link").style.display = "inline-flex";

    // Init proxy libs (deferred scripts should be ready by now)
    initScramjet();
    initBaremux();

    // Load data in parallel
    Promise.all([loadServerCookies(), loadPins(), loadBookmarklets()])
      .then(function() {
        resetTimer();
        setInterval(saveServerCookies, 15000);
        window.addEventListener("beforeunload", saveServerCookies);
        showUI(); // <-- guaranteed call here
      })
      .catch(function(e) {
        console.error("[Kairo] Data load error:", e);
        showUI(); // <-- still show UI even if data fails
      });
  })
  .catch(function() {
    location.href = "/login.html";
  });
</script>
</body>
</html>
