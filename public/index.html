<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kairo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237b6ef6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='20' fill='white'%3EK%3C/text%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>
  <!-- Load scramjet + baremux before anything else -->
  <script src="/scram/scramjet.all.js"></script>
  <script src="/baremux/index.js"></script>
  <style>
    .pin img { width:18px;height:18px;filter:brightness(0) invert(1);opacity:0.82;transition:opacity 0.15s; }
    .pin:hover img { opacity:1; }
    .proxy-url-input {
      flex:1;background:rgba(19,22,27,0.8);border:1px solid #1c2028;border-radius:8px;
      color:#8a94a0;font-size:0.78rem;font-family:'DM Sans',sans-serif;
      padding:4px 10px;outline:none;min-width:0;transition:border-color 0.15s,color 0.15s;
    }
    .proxy-url-input:focus { border-color:#7b6ef6;color:#e8ecf0; }

    /* ── Bookmark bar ── */
    #bookmark-bar {
      align-items:center;gap:2px;padding:0 8px;
      height:30px;background:#0b0d10;
      border-bottom:1px solid #1c2028;
      overflow-x:auto;flex-shrink:0;
      scrollbar-width:none;display:none;
    }
    #bookmark-bar::-webkit-scrollbar { display:none; }
    #bookmark-bar.visible { display:flex; }
    .bm-btn {
      display:inline-flex;align-items:center;gap:4px;padding:2px 9px;
      border-radius:5px;border:none;background:transparent;
      color:#8a94a0;font-size:0.74rem;font-family:'DM Sans',sans-serif;
      cursor:pointer;white-space:nowrap;flex-shrink:0;
      transition:background 0.12s,color 0.12s;
    }
    .bm-btn:hover { background:rgba(123,110,246,0.12);color:#e8ecf0; }
    .bm-btn svg { width:10px;height:10px;opacity:0.5;flex-shrink:0; }
    .bm-btn:hover svg { opacity:1; }

    /* ── Frame loading overlay ── */
    #frame-loader {
      position:absolute;inset:0;background:#07080a;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:14px;z-index:10;transition:opacity 0.25s;
    }
    #frame-loader.hidden { opacity:0;pointer-events:none; }
    .frame-loader-bar { width:160px;height:2px;background:#1c2028;border-radius:2px;overflow:hidden; }
    .frame-loader-fill {
      height:100%;background:linear-gradient(90deg,#7b6ef6,#9d92fa);border-radius:2px;
      animation:fbar 1.1s ease-in-out infinite;
    }
    @keyframes fbar { 0%{width:0%;margin-left:0%} 50%{width:55%;margin-left:22%} 100%{width:0%;margin-left:100%} }
    .frame-loader-text { font-size:0.75rem;color:#5a6370;font-family:'DM Sans',sans-serif; }
    .frame-loader-url { font-size:0.68rem;color:#353d4a;font-family:'DM Sans',sans-serif;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

    /* ── Top progress bar ── */
    #top-progress {
      position:absolute;top:0;left:0;height:2px;
      background:linear-gradient(90deg,#7b6ef6,#9d92fa);
      width:0%;transition:width 0.25s ease;z-index:20;border-radius:0 2px 2px 0;
    }
  </style>

  <script>
    var _uiShown = false;
    function showUI() {
      if (_uiShown) return; _uiShown = true;
      var l=document.getElementById("loader"), h=document.getElementById("home");
      if (l) l.style.display="none"; if (h) h.style.display="block";
    }
    setTimeout(showUI, 5000);
    window.addEventListener("error", function(e){ showUI(); });
    window.addEventListener("unhandledrejection", function(e){ showUI(); });
  </script>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Kairo</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="home" style="display:none;">
  <nav class="nav">
    <a class="nav-brand" href="/">Kairo</a>
    <div class="nav-actions">
      <span id="greeting-name" style="font-size:0.78rem;color:#5a6370;margin-right:4px;"></span>
      <a class="nav-btn" href="/admin" id="admin-link" style="display:none;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Admin
      </a>

      <button class="nav-btn" id="reset-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
        Reset
      </button>
      <button class="nav-btn" id="logout-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <div style="text-align:center;">
        <div class="hero-heading">Kairo</div>
        <div class="hero-sub">Private Browsing</div>
      </div>
      <div class="search-wrap">
        <input type="text" id="url-input" class="search-input"
          placeholder="Search or enter a URL…"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="search-go" id="go-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <!-- Tab cloak button — prominent, on home page -->
      <button onclick="tabCloak()" style="
        display:inline-flex;align-items:center;gap:7px;
        background:none;border:1px solid #1c2028;border-radius:8px;
        color:#5a6370;font-size:0.78rem;font-family:'DM Sans',sans-serif;
        padding:6px 14px;cursor:pointer;transition:all 0.15s;margin-top:-8px;
      " onmouseover="this.style.borderColor='#7b6ef6';this.style.color='#e8ecf0'"
         onmouseout="this.style.borderColor='#1c2028';this.style.color='#5a6370'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        Cloak Tab (opens Google decoy)
      </button>

      <div class="error-toast" id="error-toast" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-msg">Something went wrong. Please try again.</span>
      </div>
    </section>
    <section>
      <div class="section-label">Quick Access</div>
      <div class="pins-grid" id="pins-grid"></div>
    </section>
  </main>
  <footer class="footer-bar"><span>Kairo &mdash; Private Browsing</span></footer>
</div>

<!-- Proxy view -->
<div id="proxy-view" style="display:none;position:fixed;inset:0;z-index:500;flex-direction:column;background:#07080a;">

  <!-- URL / nav bar -->
  <div class="proxy-bar" style="position:relative;gap:6px;">
    <div id="top-progress"></div>

    <!-- Back / Fwd -->
    <button class="proxy-back" id="proxy-back-btn" title="Back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="proxy-back" id="proxy-fwd-btn" title="Forward">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- URL bar -->
    <input id="proxy-url-bar" class="proxy-url-input" placeholder="Enter URL…" autocomplete="off" spellcheck="false"/>

    <!-- Reload -->
    <button class="proxy-back" id="proxy-reload-btn" title="Reload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/></svg>
    </button>

    <!-- Toggle bookmark bar -->
    <button class="proxy-back" id="bm-bar-toggle-btn" title="Toggle bookmarks">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2H5z"/></svg>
    </button>

    <!-- Home -->
    <button class="proxy-back" id="proxy-home-btn" title="Home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
  </div>

  <!-- Bookmark bar (hidden by default, toggle with button) -->
  <div id="bookmark-bar"></div>

  <!-- Page frame -->
  <div id="frame-container" style="flex:1;overflow:hidden;position:relative;">
    <div id="frame-loader">
      <div class="frame-loader-bar"><div class="frame-loader-fill"></div></div>
      <div class="frame-loader-text">Loading…</div>
      <div class="frame-loader-url" id="frame-loader-url"></div>
    </div>
    <iframe id="sj-frame" style="width:100%;height:100%;border:none;display:block;position:absolute;inset:0;" allow="fullscreen"></iframe>
  </div>
</div>

<!-- Inactivity overlay -->
<div id="timeout-overlay" style="display:none;position:fixed;inset:0;background:rgba(7,8,10,0.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#e8ecf0;">Session expired</div>
  <div style="font-size:0.85rem;color:#5a6370;">You were inactive for 20 minutes</div>
  <button id="signin-again-btn" style="margin-top:8px;padding:10px 24px;background:#7b6ef6;border:none;border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;">Sign in again</button>
</div>

<script src="/register-sw.js"></script>
<script src="/search.js"></script>

<script>
// ── Constants ─────────────────────────────────────────────
var SEARCH_ENGINE = "https://www.google.com/search?q=%s&hl=en&gl=US";
var WISP_URL = (location.protocol==="https:"?"wss":"ws")+"://"+location.host+"/wisp/";

// ── State ─────────────────────────────────────────────────
var scramjet = null, connection = null, currentFrame = null;
var swReady = false, bookmarklets = [], progressTimer = null;
var bmBarVisible = false;

// ── Tab cloak ─────────────────────────────────────────────
// Two modes:
// 1. Panic key (Escape x2) — instantly replaces current tab title + favicon with Google
// 2. Cloak Tab button — opens a fake about:blank decoy tab, keeps current tab working
var _panicCount = 0, _panicTimer = null;

function tabCloak() {
  // Open a decoy about:blank tab — this is what someone glancing sees
  var decoy = window.open("about:blank", "_blank");
  if (!decoy) { alert("Allow popups for this site to use tab cloaking."); return; }
  // Write a convincing Google-like page into the decoy
  decoy.document.open();
  decoy.document.write('<!DOCTYPE html><html><head><title>Google</title>' +
    '<link rel="icon" href="https://www.google.com/favicon.ico"/>' +
    '<style>body{margin:0;background:#fff;font-family:arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding-top:100px;}' +
    'input{width:450px;padding:12px 16px;border:1px solid #dfe1e5;border-radius:24px;font-size:16px;outline:none;}' +
    'input:focus{border-color:#4285f4;box-shadow:0 1px 6px rgba(32,33,36,.28);}' +
    '.logo{margin-bottom:28px;}</style></head>' +
    '<body><img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" width="272" height="92"/>' +
    '<input type="text" placeholder="Search Google or type a URL"/></body></html>');
  decoy.document.close();

  // Also disguise THIS tab in case someone looks at the tab strip
  document.title = "Google";
  var link = document.querySelector("link[rel~='icon']");
  if (link) link.href = "https://www.google.com/favicon.ico";
}

// ── Progress ──────────────────────────────────────────────
function startProgress(url) {
  var bar=document.getElementById("top-progress");
  var loader=document.getElementById("frame-loader");
  var lu=document.getElementById("frame-loader-url");
  if (lu) lu.textContent=url||"";
  if (loader) loader.classList.remove("hidden");
  clearInterval(progressTimer);
  var pct=0; if (bar) bar.style.width="0%";
  progressTimer=setInterval(function(){ pct=pct+(85-pct)*0.07; if(bar) bar.style.width=pct+"%"; },180);
}
function finishProgress() {
  var bar=document.getElementById("top-progress"), loader=document.getElementById("frame-loader");
  clearInterval(progressTimer);
  if (bar){bar.style.width="100%"; setTimeout(function(){bar.style.width="0%";},350);}
  if (loader) setTimeout(function(){loader.classList.add("hidden");},250);
}

// ── Scramjet ──────────────────────────────────────────────
function initScramjet() {
  try {
    if (typeof $scramjetLoadController!=="function") return;
    var ctrl=$scramjetLoadController();
    scramjet=new ctrl.ScramjetController({
      files:{wasm:"/scram/scramjet.wasm.wasm",all:"/scram/scramjet.all.js",sync:"/scram/scramjet.sync.js"}
    });
    scramjet.init();
  } catch(e){ console.error("[Kairo] SJ:",e); }
}

// ── BareMux ───────────────────────────────────────────────
function getConn() {
  if (!connection) try { connection=new BareMux.BareMuxConnection("/baremux/worker.js"); } catch(e){ return null; }
  return connection;
}
function ensureTransport() {
  var c=getConn(); if (!c) return Promise.resolve();
  return c.getTransport().then(function(t){
    if (t!=="/libcurl/index.mjs") return c.setTransport("/libcurl/index.mjs",[{websocket:WISP_URL}]);
  }).catch(function(){});
}

// ── SW ────────────────────────────────────────────────────
function ensureSW() {
  if (swReady) return Promise.resolve();
  if (typeof registerSW!=="function") return Promise.resolve();
  return registerSW().then(function(){swReady=true;}).catch(function(e){showError("SW: "+e.message);throw e;});
}

// ── Geo ───────────────────────────────────────────────────
function addGeo(url) {
  try {
    var u=new URL(url);
    if (u.hostname.includes("google.com")||u.hostname.includes("youtube.com"))
      { u.searchParams.set("hl","en"); u.searchParams.set("gl","US"); }
    return u.toString();
  } catch(e){ return url; }
}

// ── Navigate ──────────────────────────────────────────────
function go() {
  hideError();
  var val=document.getElementById("url-input").value.trim();
  if (!val) return;
  if (typeof search==="function") val=search(val,SEARCH_ENGINE);
  else if (!val.startsWith("http")) val=val.includes(".")?"https://"+val:"https://www.google.com/search?q="+encodeURIComponent(val);
  if (val.startsWith("http://")) val=val.replace("http://","https://");
  val=addGeo(val);
  if (!scramjet){showError("Proxy not ready — reload the page");return;}
  ensureSW().then(ensureTransport).then(function(){openProxy(val);}).catch(function(e){showError(e.message||"Failed");});
}
function goTo(url){ document.getElementById("url-input").value=url; go(); }

function openProxy(url) {
  if (currentFrame){try{currentFrame.frame.remove();}catch(e){} currentFrame=null;}
  startProgress(url);
  try {
    var frame=scramjet.createFrame();
    frame.frame.style.cssText="width:100%;height:100%;border:none;display:block;position:absolute;inset:0;";
    var container=document.getElementById("frame-container");
    var old=container.querySelector("iframe"); if (old) old.remove();
    container.appendChild(frame.frame);
    currentFrame=frame;
    document.getElementById("proxy-url-bar").value=url;
    document.getElementById("proxy-view").style.display="flex";
    document.getElementById("home").style.display="none";
    frame.frame.addEventListener("load",function(){finishProgress();});
    frame.go(url);
    saveServerCookies();
  } catch(e){finishProgress();showError("Failed: "+e.message);}
}

function closeProxy() {
  if (currentFrame){try{currentFrame.frame.remove();}catch(e){} currentFrame=null;}
  document.getElementById("proxy-view").style.display="none";
  document.getElementById("home").style.display="block";
  var loader=document.getElementById("frame-loader"); if (loader) loader.classList.remove("hidden");
}

function showError(msg){document.getElementById("error-msg").textContent=msg||"Something went wrong.";document.getElementById("error-toast").style.display="flex";}
function hideError(){document.getElementById("error-toast").style.display="none";}

// ── Proxy bar buttons ─────────────────────────────────────
document.getElementById("proxy-back-btn").addEventListener("click",function(){try{currentFrame&&currentFrame.frame.contentWindow.history.back();}catch(e){}});
document.getElementById("proxy-fwd-btn").addEventListener("click",function(){try{currentFrame&&currentFrame.frame.contentWindow.history.forward();}catch(e){}});
document.getElementById("proxy-reload-btn").addEventListener("click",function(){
  if (!currentFrame) return;
  var url=document.getElementById("proxy-url-bar").value; startProgress(url);
  try{currentFrame.frame.contentWindow.location.reload();}catch(e){currentFrame.go(url);}
});
document.getElementById("proxy-home-btn").addEventListener("click",closeProxy);


// ── Bookmark bar toggle ───────────────────────────────────
document.getElementById("bm-bar-toggle-btn").addEventListener("click",function(){
  bmBarVisible=!bmBarVisible;
  var bar=document.getElementById("bookmark-bar");
  if (bmBarVisible) bar.classList.add("visible");
  else bar.classList.remove("visible");
  // Persist preference
  try { localStorage.setItem("kairo_bm_bar", bmBarVisible?"1":"0"); } catch(e){}
});

// ── URL bar enter ─────────────────────────────────────────
document.getElementById("proxy-url-bar").addEventListener("keydown",function(e){
  if (e.key!=="Enter") return;
  var val=typeof search==="function"?search(this.value.trim(),SEARCH_ENGINE):this.value.trim();
  if (val.startsWith("http://")) val=val.replace("http://","https://");
  val=addGeo(val); startProgress(val);
  ensureTransport().then(function(){if(currentFrame){currentFrame.go(val);document.getElementById("proxy-url-bar").value=val;}});
});

// ── Devtools ──────────────────────────────────────────────
document.addEventListener("keydown",function(e){
  if (e.ctrlKey&&e.shiftKey&&e.altKey&&(e.key==="I"||e.key==="i")){
    e.preventDefault();
    if (currentFrame&&currentFrame.frame) window.open(currentFrame.frame.src,"_blank");
  }
});

// ── Bookmarklet injection ─────────────────────────────────
function runBookmarklet(code) {
  if (!currentFrame) return;
  try { currentFrame.go("javascript:"+encodeURIComponent("(function(){"+code+"})()")); }
  catch(e){ console.warn("BM:",e); }
}

function renderBookmarkBar() {
  var bar=document.getElementById("bookmark-bar");
  bar.innerHTML="";
  if (!bookmarklets.length) return;
  bar.innerHTML=bookmarklets.map(function(b,i){
    return '<button class="bm-btn" data-i="'+i+'">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2H5z"/></svg>' +
      b.name+'</button>';
  }).join("");
  bar.querySelectorAll(".bm-btn").forEach(function(el){
    el.addEventListener("click",function(){
      var b=bookmarklets[parseInt(this.getAttribute("data-i"))];
      if (b) runBookmarklet(b.code);
    });
  });
}

// ── Pins ──────────────────────────────────────────────────
function loadPins() {
  fetch("/api/pins").then(function(r){return r.json();}).then(function(data){
    document.getElementById("pins-grid").innerHTML=(data.pins||[]).map(function(p){
      return '<div class="pin" onclick="goTo(\''+addGeo(p.url)+'\')" title="'+p.name+'">' +
        '<img src="https://unpkg.com/simple-icons@latest/icons/'+p.icon+'.svg" alt="'+p.name+'" loading="lazy" onerror="this.style.opacity=\'0.3\'"/></div>';
    }).join("");
  }).catch(function(){});
}

// ── Bookmarklets ──────────────────────────────────────────
function loadBookmarklets() {
  fetch("/api/bookmarklets").then(function(r){return r.json();}).then(function(items){
    bookmarklets=items||[];
    renderBookmarkBar();
    // Restore saved visibility
    try {
      var saved=localStorage.getItem("kairo_bm_bar");
      if (saved==="1"&&bookmarklets.length){
        bmBarVisible=true;
        document.getElementById("bookmark-bar").classList.add("visible");
      }
    } catch(e){}
  }).catch(function(){});
}

// ── Cookie sync ───────────────────────────────────────────
function loadServerCookies() {
  return fetch("/api/cookies").then(function(r){return r.json();}).then(function(data){
    if (!data.cookies) return;
    data.cookies.split("||").forEach(function(entry){
      var idx=entry.indexOf("=:="); if (idx===-1) return;
      document.cookie=decodeURIComponent(entry.slice(0,idx))+"="+decodeURIComponent(entry.slice(idx+3))+"; path=/; SameSite=Lax";
    });
  }).catch(function(){});
}
function saveServerCookies() {
  try {
    var encoded=document.cookie.split(";").map(function(c){return c.trim();}).filter(Boolean)
      .map(function(c){var i=c.indexOf("=");return i===-1?null:encodeURIComponent(c.slice(0,i).trim())+"=:="+encodeURIComponent(c.slice(i+1).trim());})
      .filter(Boolean).join("||");
    if (!encoded) return;
    fetch("/api/cookies",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cookies:encoded}),keepalive:true});
  } catch(e){}
}
function clearSessions(){
  document.cookie.split(";").forEach(function(c){document.cookie=c.trim().split("=")[0]+"=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";});
  fetch("/api/cookies",{method:"DELETE"}).then(function(){alert("Sessions cleared.");});
}
function logout(){ fetch("/api/logout",{method:"POST"}).then(function(){location.href="/login.html";}); }

// ── Inactivity ────────────────────────────────────────────
var inactivityTimer;
function resetTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer=setTimeout(function(){
    fetch("/api/logout",{method:"POST"}).then(function(){document.getElementById("timeout-overlay").style.display="flex";});
  },20*60*1000);
}
["mousemove","keydown","click","scroll","touchstart"].forEach(function(e){document.addEventListener(e,resetTimer,{passive:true});});

// ── Wiring ────────────────────────────────────────────────
document.getElementById("go-btn").addEventListener("click",go);
document.getElementById("logout-btn").addEventListener("click",logout);
document.getElementById("reset-btn").addEventListener("click",clearSessions);
document.getElementById("signin-again-btn").addEventListener("click",function(){location.href="/login.html";});
document.getElementById("url-input").addEventListener("keydown",function(e){if(e.key==="Enter")go();});

// ── Boot ──────────────────────────────────────────────────
// Run auth check and asset loads in parallel for fastest startup
Promise.all([
  fetch("/api/me").then(function(r){return r.json();}).catch(function(){return {loggedIn:false};}),
  loadServerCookies(),
  loadPins(),
  loadBookmarklets()
]).then(function(results){
  var me=results[0];
  if (!me.loggedIn){location.href="/login.html";return;}
  if (me.displayName) document.getElementById("greeting-name").textContent="Hi, "+me.displayName+" 👋";
  if (me.isAdmin) document.getElementById("admin-link").style.display="inline-flex";
  initScramjet();
  ensureTransport().catch(function(){});
  resetTimer();
  setInterval(saveServerCookies,15000);
  window.addEventListener("beforeunload",saveServerCookies);
  showUI();
}).catch(function(){location.href="/login.html";});
</script>
</body>
</html>
