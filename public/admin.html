<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Kairo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237b6ef6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='20' fill='white'%3EK%3C/text%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>
  <link rel="stylesheet" href="/admin.css"/>
</head>
<body>

<div id="login-screen" class="login-page" style="display:none;">
  <div class="login-card">
    <div class="login-logo">Kairo</div>
    <div class="login-tagline">Admin access required</div>
    <div class="field"><label>Username</label><input type="text" id="login-user" autocomplete="off" autocapitalize="none" placeholder="username"/></div>
    <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••"/></div>
    <button class="btn-primary" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Invalid credentials or not an admin
    </div>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo">Kairo</div>
    <div class="sidebar-label">Manage</div>
    <a class="nav-link active" onclick="showTab('users',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Users
    </a>
    <a class="nav-link" onclick="showTab('add-user',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Add User
    </a>
    <div class="sidebar-label">Bookmarklets</div>
    <a class="nav-link" onclick="showTab('bookmarklets',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3a2 2 0 0 0-2 2v16l7-3 7 3V5a2 2 0 0 0-2-2H5z"/></svg>
      View All
    </a>
    <a class="nav-link" onclick="showTab('add-bookmarklet',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Bookmarklet
    </a>
    <button class="logout-btn" onclick="doLogout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Log out
    </button>
  </aside>

  <div class="main-panel">
    <div class="top-bar">
      <div>
        <div class="greeting" id="greeting-text"></div>
        <div class="hello-name" id="hello-name">Hello 👋</div>
      </div>
      <a href="/" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Kairo
      </a>
    </div>

    <div class="content-area">
      <div id="tab-users" class="tab-content active">
        <div class="section-head"><div class="section-title">All Users</div></div>
        <div class="table-wrap"><table><thead><tr><th>Display Name</th><th>Username</th><th>Created</th><th>Action</th></tr></thead><tbody id="users-tbody"></tbody></table></div>
      </div>

      <div id="tab-add-user" class="tab-content">
        <div class="section-head"><div class="section-title">Add New User</div></div>
        <div class="form-card">
          <input type="text" id="new-displayname" placeholder="Display Name (e.g. John)" autocomplete="off"/>
          <input type="text" id="new-username" placeholder="Username (used to log in)" autocomplete="off" autocapitalize="none"/>
          <input type="password" id="new-password" placeholder="Password"/>
          <button class="full-btn" onclick="addUser()">Create User</button>
          <div class="msg" id="add-user-msg"></div>
        </div>
      </div>

      <div id="tab-bookmarklets" class="tab-content">
        <div class="section-head"><div class="section-title">Bookmarklets</div></div>
        <div class="table-wrap"><table><thead><tr><th>Name</th><th>Description</th><th>Added</th><th>Action</th></tr></thead><tbody id="bm-tbody"></tbody></table></div>
      </div>

      <div id="tab-add-bookmarklet" class="tab-content">
        <div class="section-head"><div class="section-title">Add Bookmarklet</div></div>
        <div class="form-card">
          <input type="text" id="bm-name" placeholder="Name" autocomplete="off"/>
          <input type="text" id="bm-desc" placeholder="Description (optional)" autocomplete="off"/>
          <textarea id="bm-code" placeholder="Paste bookmarklet JS code here (with or without 'javascript:')"></textarea>
          <button class="full-btn" onclick="addBookmarklet()">Save Bookmarklet</button>
          <div class="msg" id="add-bm-msg"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function getGreeting() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12) return "Good morning ☀️";
    if (h >= 12 && h < 17) return "Good afternoon 🌤";
    if (h >= 17 && h < 21) return "Good evening 🌆";
    return "Good night 🌙";
  }

  async function init() {
    const me = await fetch("/api/me").then(r => r.json());
    if (me.loggedIn && me.isAdmin) {
      showDashboard(me.displayName || me.username);
    } else {
      document.getElementById("login-screen").style.display = "flex";
    }
  }

  function showDashboard(name) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("dashboard").style.display = "flex";
    document.getElementById("greeting-text").textContent = getGreeting();
    document.getElementById("hello-name").textContent = `Hello, ${name}! 👋`;
    loadUsers(); loadBookmarklets();
  }

  async function doLogin() {
    const username = document.getElementById("login-user").value.trim();
    const password = document.getElementById("login-pass").value;
    const err = document.getElementById("login-error");
    err.style.display = "none";
    const data = await fetch("/api/login", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({username,password}) }).then(r=>r.json());
    if (data.success && data.isAdmin) showDashboard(data.displayName || username);
    else err.style.display = "flex";
  }

  async function doLogout() { await fetch("/api/logout", {method:"POST"}); location.reload(); }

  async function loadUsers() {
    const users = await fetch("/api/users").then(r => r.json());
    document.getElementById("users-tbody").innerHTML = users.map(u => `
      <tr>
        <td>${u.displayName || u.username}</td>
        <td style="color:var(--muted)">${u.username}</td>
        <td style="color:var(--muted)">${new Date(u.createdAt).toLocaleDateString()}</td>
        <td>${u.username==="admin" ? '<span class="badge">Protected</span>' : `<button class="del-btn" onclick="deleteUser('${u.username}')">Delete</button>`}</td>
      </tr>`).join("");
  }

  async function addUser() {
    const displayName = document.getElementById("new-displayname").value.trim();
    const username = document.getElementById("new-username").value.trim();
    const password = document.getElementById("new-password").value;
    const msg = document.getElementById("add-user-msg");
    const data = await fetch("/api/users", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,password,displayName})}).then(r=>r.json());
    msg.style.display = "block";
    if (data.success) { msg.className="msg ok"; msg.textContent="✓ User created"; document.getElementById("new-displayname").value=""; document.getElementById("new-username").value=""; document.getElementById("new-password").value=""; }
    else { msg.className="msg err"; msg.textContent="✗ "+data.error; }
  }

  async function deleteUser(username) {
    if (!confirm(`Delete "${username}"?`)) return;
    await fetch("/api/users/"+username, {method:"DELETE"});
    loadUsers();
  }

  async function loadBookmarklets() {
    const items = await fetch("/api/bookmarklets").then(r => r.json());
    document.getElementById("bm-tbody").innerHTML = items.length
      ? items.map(b=>`<tr><td>${b.name}</td><td style="color:var(--muted)">${b.description||"—"}</td><td style="color:var(--muted)">${new Date(b.createdAt).toLocaleDateString()}</td><td style="display:flex;gap:6px;"><button class="del-btn" onclick="copyBookmarklet('${b._id}','${encodeURIComponent(b.code)}')">Copy</button><button class="del-btn" onclick="deleteBookmarklet('${b._id}')">Delete</button></td></tr>`).join("")
      : `<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:24px;">No bookmarklets yet</td></tr>`;
  }

  async function addBookmarklet() {
    let code = document.getElementById("bm-code").value.trim();
    if (code.startsWith("javascript:")) code = decodeURIComponent(code.slice(11));
    const name = document.getElementById("bm-name").value.trim();
    const description = document.getElementById("bm-desc").value.trim();
    const msg = document.getElementById("add-bm-msg");
    const data = await fetch("/api/bookmarklets",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,description,code})}).then(r=>r.json());
    msg.style.display="block";
    if (data.success) { msg.className="msg ok"; msg.textContent="✓ Saved"; document.getElementById("bm-name").value=""; document.getElementById("bm-desc").value=""; document.getElementById("bm-code").value=""; loadBookmarklets(); }
    else { msg.className="msg err"; msg.textContent="✗ "+data.error; }
  }

  async function copyBookmarklet(id, encodedCode) {
    const code = decodeURIComponent(encodedCode);
    try {
      await navigator.clipboard.writeText("javascript:" + encodeURIComponent(code));
      alert("Bookmarklet URL copied to clipboard!");
    } catch(e) {
      // Fallback
      const ta = document.createElement("textarea");
      ta.value = "javascript:" + encodeURIComponent(code);
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      alert("Bookmarklet URL copied!");
    }
  }

  async function deleteBookmarklet(id) {
    if (!confirm("Delete?")) return;
    await fetch("/api/bookmarklets/"+id, {method:"DELETE"});
    loadBookmarklets();
  }

  function showTab(name, el) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
    document.getElementById("tab-"+name).classList.add("active");
    if (el) el.classList.add("active");
  }

  document.addEventListener("keydown", e => { if (e.key==="Enter" && document.getElementById("login-screen").style.display!=="none") doLogin(); });
  init();
</script>
</body>
</html>
