<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kairo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237b6ef6'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='20' fill='white'%3EK%3C/text%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">Kairo</div>
      <div class="login-tagline">Enter your credentials to continue</div>
      <div class="field"><label>Username</label><input type="text" id="username" placeholder="username" autocomplete="off" autocapitalize="none"/></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
      <button class="btn-primary" onclick="doLogin()">Sign in</button>
      <div class="login-error" id="err">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Invalid credentials
      </div>
    </div>
  </div>
  <script>
    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const err = document.getElementById("err");
      err.style.display = "none";
      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) location.href = "/";
      else err.style.display = "flex";
    }
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
